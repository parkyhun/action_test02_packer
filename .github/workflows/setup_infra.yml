# .github/workflows/setup_infra.yml

name: 'Setup infra'

on:
  push: 
    branches:
      - master              # master 브렌치의 push 이면서
    paths:
      - "terraform/**"      # terraform/ 하위 경로에 변화가 있을때 동작하게 한다
    workflow_dispatch:      # 원할대 실행할수 있는 버튼을 github action에 만들어 지도록 한다


jobs:
  terraform-run:
    runs-on: ubuntu-latest
    steps:
      # checkout 
      - name: Checkout Repository
        uses: actions/checkout@v4
      # aws 인증정보 제공 
      - name: Aws Configure 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2   
      # 테라폼 설치 
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v4
       # ./terraform 안에 있는 terraform 자원을 init, apply
      - name: Terraform Init & Apply 
        run: |
          terraform init
          terraform apply --auto-approve
        # ./terraform 폴더안에서 위의 명령어가 실행이 된다.
        working-directory: ./terraform    
      