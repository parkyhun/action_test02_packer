# .github/workflows/setup_infra.yml

name: 'Setup infra'

on:
  push: 
    branches:
      - master              # master 브렌치의 push 이면서
    paths:
      - "terraform/**"      # terraform/ 하위 경로에 변화가 있을때 동작하게 한다
    workflow_dispatch:      # 원할대 실행할수 있는 버튼을 github action에 만들어 지도록 한다


jobs:
  terraform-run:
    runs-on: ubuntu-latest
    steps:
      - name: checkout Repository     # github 저장소로 부터 소스코드 가져오기
        user: actions/checkout@v4

        # 인증정보를 환경변수에 넣을수도 있지만 혹시 중간에 에러가 났을때 인증키가 로그에 노출될수 있다.
      - name: AWS configure         # aws 인증정보 제공
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Setup Terraform               # terraform 설치
        uses: hashicorp/setup-terraform@v4


      - name: Terraform Init & Apply       # ./terraform 안에 있는 terraform 자원을 init & apply 
        run: |
          terraform init
          terraform apply --auto-approve
        working-directory: ./terraform      # 의미는 이 파일 경로에서 위에 run 진행/ ./terraform 폴더안에서 위의 명령어가 실행이 된다
      